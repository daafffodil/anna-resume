    <script src="https://cdn.tailwindcss.com"></script>

        }

            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));

            margin: 16px 0;
        }

            height: 200px;
            border-radius: 8px;

        }

            height: 100%;

        }

            border-radius: 8px;
            padding: 16px;
            margin: 16px 0;
            text-align: center;
        }

            align-items: center;
            gap: 8px;
            background: #1e293b;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            transition: background 0.3s;
            margin: 8px;
        }
        .pdf-download-btn:hover {
            background: #0f172a;
        }
    </style>
</head>
<body class="bg-white">
    <div id="app"></div>

                                <p class="text-slate-500 text-sm">AI产品运营 / 品牌市场部 / 出海营销策略</p>

                    <!-- 详情面板 -->

                const newId = Math.max(...resumes.map(r => r.id), 0) + 1;
                resumes.push({
                    id: newId,
                    title: formData.title,
                    company: formData.company,
                    date: formData.date,
                    summary: formData.summary,
                    jd: formData.jd,
                    tags: formData.tags.split(",").map(t => t.trim()).filter(t => t),
                    images: ["https://via.placeholder.com/600x400?text=Image+1"],
                    pdfUrl: "#",
                    pdfName: "resume.pdf"
                });
                formData = { title: "", company: "", date: "", summary: "", jd: "", tags: "" };
                showUploadForm = false;
                render();
            }
        }

        function selectResume(id) {
            selectedResume = id ? resumes.find(r => r.id === id) : null;
            render();
        }

        function deleteResume(id) {
            resumes = resumes.filter(r => r.id !== id);
            if (selectedResume?.id === id) {
                selectedResume = null;
            }
            render();
        }

        function shareResume(id) {
            const resume = resumes.find(r => r.id === id);
            if (resume) {
                const shareText = `我的${resume.title}简历版本 - ${resume.company} | ${resume.summary}`;
                if (navigator.share) {
                    navigator.share({
                        title: "简历展示",
                        text: shareText
                    }).catch(() => {});
                } else {
                    alert(`分享链接：${window.location.href}\n\n${shareText}`);
                }
            }
        }

        // 初始渲染
        render();
    </script>
</body>
</html>
